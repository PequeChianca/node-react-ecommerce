services:
  mongo-db:
    image: mongo:5.0
    container_name: mongo-db
    restart: unless-stopped
    # Port intentionally not exposed to the host in production.
    # Services communicate via the internal Docker network.
    volumes:
      - mongo-data:/data/db
  azurite-storage-emulator:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite-storage-emulator
    restart: unless-stopped
    command: azurite --skipApiVersionCheck --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    # Ports intentionally not exposed to the host in production.
    volumes:
      - azurite-data:/data
  orders-service:
    container_name: orders-service
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: orders-service/dockerfile
    environment:
      - MONGODB_URL=mongodb://mongo-db:27017
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
      - RABBIT_MQ=amqp://rabbitmq
    depends_on:
      - mongo-db
  products-service:
    container_name: products-service
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: products-service/dockerfile
    environment:
      - MONGODB_URL=mongodb://mongo-db:27017
      - AZURE_BLOB_CONNECTION_STRING=${AZURE_BLOB_CONNECTION_STRING}
    depends_on:
      - mongo-db
      - azurite-storage-emulator
  users-service:
    container_name: users-service
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: users-service/dockerfile
    environment:
      - MONGODB_URL=mongodb://mongo-db:27017
    depends_on:
      - mongo-db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    # Only the management UI port (15672) is suppressed in production.
    ports:
      - "5672:5672"
    # The AMQP port is internal-only; services connect via container name.        
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  notifications-service:
    container_name: notifications-service
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: notifications-service/dockerfile
    environment:
      - MONGODB_URL=mongodb://mongo-db:27017
      - RABBIT_MQ=amqp://rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo-db:
        condition: service_started
  nginx:
    container_name: api-gateway
    restart: unless-stopped
    build:
      context: ./backend/nginx
      dockerfile: dockerfile
    ports:
      - "5000:80"
    depends_on:
      - orders-service
      - products-service
      - users-service
      - notifications-service
  frontend:
    container_name: frontend
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: dockerfile
    environment:
      - API_GATEWAY_URL=http://api-gateway:80
    ports:
      - "3000:80"
    depends_on:
      - nginx

volumes:
  mongo-data:
  azurite-data:
  rabbitmq-data: