services:
  mongo-db:
    image: mongo:5.0
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  azurite-storage-emulator:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite-storage-emulator
    command: azurite --skipApiVersionCheck --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
  orders-service:
    container_name: orders-service
    build:
      context: ./backend
      dockerfile: orders-service/dockerfile
    ports:
      - "5001:3000"
    environment:
      - MONGODB_URL=mongodb://mongo-db:27017
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
    depends_on:
      - mongo-db
  products-service:
    container_name: products-service
    build:
      context: ./backend
      dockerfile: products-service/dockerfile
    ports:
      - "5002:3000"
    environment:
      - MONGODB_URL=mongodb://mongo-db:27017                                     
      - AZURE_BLOB_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-storage-emulator:10000/devstoreaccount1;
    depends_on:
      - mongo-db
      - azurite-storage-emulator
  users-service:
    container_name: users-service
    build:
      context: ./backend
      dockerfile: users-service/dockerfile
    ports:
      - "5003:3000"
    environment:
      - MONGODB_URL=mongodb://mongo-db:27017
    depends_on:
      - mongo-db
  
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  notifications-service:
    container_name: notifications-service
    build:
      context: ./backend
      dockerfile: notifications-service/dockerfile
    ports:
      - "5004:3000"
    environment:
      - MONGODB_URL=mongodb://mongo-db:27017
      - RABBIT_MQ=amqp://rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo-db:
        condition: service_started
  nginx:
    container_name: api-gateway
    build:
      context: ./backend/nginx
      dockerfile: dockerfile
    ports:
      - "5000:80"
    depends_on:
      - orders-service
      - products-service
      - users-service
      - notifications-service

volumes:
  mongo-data:
  azurite-data:
  rabbitmq-data: