# Compress text responses
gzip            on;
gzip_types      text/plain text/css application/javascript application/json
                image/svg+xml;
gzip_min_length 1024;

server {
    listen 80;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header X-XSS-Protection        "1; mode=block"     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Static assets: long-lived cache (hashed filenames from CRA) ──────────
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # ── Client-side routing — return index.html for any unknown path ──────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── SSE endpoint — disable buffering so frames arrive immediately ─────────
    location /api/notifications/stream {
        proxy_pass              http://api-gateway:80;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_set_header        Connection '';
        proxy_http_version      1.1;
        chunked_transfer_encoding on;
    }

    # ── All other API calls ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api-gateway:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Storage blobs served through the api-gateway → Azurite ───────────────
    location /storage/ {
        proxy_pass http://api-gateway:80;
    }
}
