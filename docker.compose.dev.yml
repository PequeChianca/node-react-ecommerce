# Development overrides — merge on top of docker.compose.yml:
#   docker compose -f docker.compose.yml -f docker.compose.dev.yml up --build
#
# Changes from production:
#   • All internal service ports exposed to the host for direct debugging
#   • Frontend replaced with CRA dev server (hot-module replacement, source maps)
#   • Azurite connection string inlined (dev-only emulator key, not a secret)
#   • RabbitMQ management UI re-exposed

services:
  mongo-db:
    ports:
      - "27017:27017"

  azurite-storage-emulator:
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"

  orders-service:
    ports:
      - "5001:3000"

  products-service:
    ports:
      - "5002:3000"
    environment:
      - MONGODB_URL=mongodb://mongo-db:27017
      # Azurite well-known development key — not a secret
      - AZURE_BLOB_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-storage-emulator:10000/devstoreaccount1;

  users-service:
    ports:
      - "5003:3000"

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI: http://localhost:15672 (guest/guest)

  notifications-service:
    ports:
      - "5004:3000"

  # Replace the production nginx-served build with the CRA dev server.
  # Source code is mounted so edits trigger hot-module replacement instantly.
  frontend:
    container_name: frontend-dev
    # Override the production nginx Dockerfile with a minimal dev image (FROM node:20-alpine).
    # Not setting 'image' here prevents Compose from tagging/overwriting the official node image.
    build:
      dockerfile: dockerfile.dev
    volumes:
      - ./frontend:/app
      # Isolate node_modules inside the container to avoid host/container conflicts
      - frontend_dev_modules:/app/node_modules
    ports:
      - "3001:3000"
    depends_on:
      - nginx

volumes:
  frontend_dev_modules:
