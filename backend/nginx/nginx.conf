upstream orders   { server orders-service:3000; }
upstream products { server products-service:3000; }
upstream users    { server users-service:3000; }

server {
    listen 80;

    location /api/config/paypal { proxy_pass http://orders; }
    location /api/orders   { proxy_pass http://orders; }
    location /api/products { proxy_pass http://products; }
    location /api/uploads  { proxy_pass http://products; }
    location /api/users    { proxy_pass http://users; }

    location /api/orders/status   { proxy_pass http://orders/status; }
    location /api/products/status { proxy_pass http://products/status; }
    location /api/users/status    { proxy_pass http://users/status; }

    location /storage/ { proxy_pass http://azurite-storage-emulator:10000/; }
}